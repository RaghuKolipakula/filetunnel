<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileTunnel — Direct P2P File Transfer</title>

  <!-- PeerJS Client Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>

  <!-- GOOGLE ADSENSE MONETIZATION SCRIPT -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5197654798298236" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 1rem; }
    .card { background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 480px; text-align: center; }
    h1 { margin-top: 0; color: #38bdf8; font-size: 1.8rem; }
    .btn { background: #0284c7; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 1rem; display: block; text-decoration: none; }
    .btn:hover { background: #0369a1; }
    .file-label { display: block; padding: 2rem; border: 2px dashed #475569; border-radius: 8px; cursor: pointer; color: #94a3b8; transition: border 0.2s; }
    .file-label:hover { border-color: #38bdf8; color: #f8fafc; }
    input[type="file"] { display: none; }
    .progress-bar-container { background: #0f172a; border-radius: 6px; height: 12px; width: 100%; margin-top: 1rem; overflow: hidden; display: none; }
    .progress-bar { background: #38bdf8; height: 100%; width: 0%; transition: width 0.1s; }
    .status { margin-top: 0.75rem; font-size: 0.85rem; color: #94a3b8; }
    .ad-zone { margin-top: 1.5rem; min-height: 90px; background: #0f172a; border-radius: 6px; border: 1px dashed #334155; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #64748b; }
  </style>
</head>
<body>

<div class="card">
  <h1>⚡ FileTunnel</h1>
  <p style="color: #94a3b8; font-size: 0.9rem;">Direct browser-to-browser transfer. No cloud storage caps.</p>

  <!-- Sender View -->
  <div id="sender-view">
    <label for="fileInput" class="file-label" id="fileLabel">📁 Drop or click to choose file</label>
    <input type="file" id="fileInput">
    <div id="share-container" style="display:none; margin-top: 1rem;">
      <p style="font-size:0.85rem; color:#94a3b8; margin-bottom: 0.25rem;">Recipient Share Link:</p>
      <input type="text" id="shareUrl" readonly style="width:100%; padding:0.5rem; border-radius:4px; border:1px solid #475569; background:#0f172a; color:#38bdf8; text-align:center;">
      <button class="btn" onclick="copyLink()">Copy Link</button>
    </div>
  </div>

  <!-- Receiver View -->
  <div id="receiver-view" style="display:none;">
    <div class="status" id="receiver-status">Connecting to sender...</div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-bar-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="status" id="transferStatus"></div>

  <!-- Auto Ads Placement Area -->
  <div class="ad-zone" id="adZone">
    <span>SPONSORED</span>
  </div>
</div>

<script>
  const CHUNK_SIZE = 64 * 1024;
  const urlParams = new URLSearchParams(window.location.search);
  const peerIdParam = urlParams.get('peer');

  let peer;
  let fileToTransfer;

  if (peerIdParam) {
    // RECEIVER MODE
    document.getElementById('sender-view').style.display = 'none';
    document.getElementById('receiver-view').style.display = 'block';

    peer = new Peer();

    peer.on('open', () => {
      const conn = peer.connect(peerIdParam, { reliable: true });
      let incomingFileInfo = null;
      let receivedBytes = 0;
      let fileChunks = [];

      document.getElementById('receiver-status').innerText = "Establishing secure P2P pipe...";

      conn.on('open', () => {
        document.getElementById('receiver-status').innerText = "Connected! Awaiting file stream...";
      });

      conn.on('data', (data) => {
        if (data.type === 'metadata') {
          incomingFileInfo = data;
          receivedBytes = 0;
          fileChunks = [];
          document.getElementById('progressContainer').style.display = 'block';
          document.getElementById('receiver-status').innerText = `Receiving: ${data.name}`;
          return;
        }

        if (data.type === 'chunk') {
          fileChunks.push(data.chunk);
          receivedBytes += data.chunk.byteLength;

          let percent = Math.floor((receivedBytes / incomingFileInfo.size) * 100);
          document.getElementById('progressBar').style.width = percent + '%';
          document.getElementById('transferStatus').innerText = `${percent}% (${(receivedBytes / 1024 / 1024).toFixed(1)} MB)`;

          if (receivedBytes >= incomingFileInfo.size) {
            const blob = new Blob(fileChunks, { type: incomingFileInfo.mime });
            const downloadUrl = URL.createObjectURL(blob);

            const dlBtn = document.createElement('a');
            dlBtn.href = downloadUrl;
            dlBtn.download = incomingFileInfo.name;
            dlBtn.className = 'btn';
            dlBtn.innerText = '💾 Download File';
            
            document.getElementById('receiver-view').appendChild(dlBtn);
            document.getElementById('receiver-status').innerText = "Transfer Complete!";
          }
        }
      });
    });

  } else {
    // SENDER MODE
    peer = new Peer();

    document.getElementById('fileInput').addEventListener('change', (e) => {
      fileToTransfer = e.target.files[0];
      if (fileToTransfer) {
        document.getElementById('fileLabel').innerText = `Selected: ${fileToTransfer.name} (${(fileToTransfer.size / 1024 / 1024).toFixed(1)} MB)`;
        document.getElementById('share-container').style.display = 'block';
      }
    });

    peer.on('open', (id) => {
      const shareUrl = `${window.location.origin}${window.location.pathname}?peer=${id}`;
      document.getElementById('shareUrl').value = shareUrl;
    });

    peer.on('connection', (conn) => {
      conn.on('open', () => {
        if (!fileToTransfer) return;

        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('transferStatus').innerText = "Sending file...";

        conn.send({
          type: 'metadata',
          name: fileToTransfer.name,
          size: fileToTransfer.size,
          mime: fileToTransfer.type
        });

        let offset = 0;
        const reader = new FileReader();

        const readNextChunk = () => {
          const slice = fileToTransfer.slice(offset, offset + CHUNK_SIZE);
          reader.readAsArrayBuffer(slice);
        };

        reader.onload = (e) => {
          if (conn.dataChannel && conn.dataChannel.bufferedAmount > 8 * 1024 * 1024) {
            setTimeout(() => {
              conn.send({ type: 'chunk', chunk: e.target.result });
              offset += e.target.result.byteLength;
              updateSenderProgress(offset, fileToTransfer.size);
              if (offset < fileToTransfer.size) readNextChunk();
            }, 50);
          } else {
            conn.send({ type: 'chunk', chunk: e.target.result });
            offset += e.target.result.byteLength;
            updateSenderProgress(offset, fileToTransfer.size);
            if (offset < fileToTransfer.size) readNextChunk();
          }
        };

        readNextChunk();
      });
    });
  }

  function updateSenderProgress(offset, totalSize) {
    let percent = Math.floor((offset / totalSize) * 100);
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('transferStatus').innerText = `Sending... ${percent}%`;
    if (offset >= totalSize) {
      document.getElementById('transferStatus').innerText = "Sent successfully!";
    }
  }

  function copyLink() {
    const copyText = document.getElementById("shareUrl");
    copyText.select();
    navigator.clipboard.writeText(copyText.value);
    alert("Link copied! Send it to your recipient.");
  }
</script>

</body>
</html>
